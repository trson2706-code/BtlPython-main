# ============================================================
# SPRINT STATUS - Hệ thống Điểm danh Sinh viên
# ============================================================
# Project: Bài tập lớn - Computer Vision (Đề tài 15)
# Created: 2026-04-15
# Last Updated: 2026-05-06 12:00
# Author: Huynguyen
# Ref: docs/lich-su-thao-luan.md
# ============================================================

# ============================================================
# THÔNG TIN DỰ ÁN
# ============================================================
project:
  name: "Điểm danh sinh viên"
  description: >
    Ứng dụng Python sử dụng Computer Vision (OpenCV + face_recognition)
    để điểm danh sinh viên tự động qua nhận diện khuôn mặt real-time.
    Giảng viên quét mặt → hệ thống tra TKB → load SV → SV quét mặt
    → xuất Excel.
  language_gui: "Tiếng Việt"
  deliverables:
    - "Source code Python chạy được"
    - "Báo cáo Word (bao_cao.docx)"
    - "Demo live bằng camera"

# ============================================================
# QUYẾT ĐỊNH KỸ THUẬT
# ============================================================
technical_decisions:

  platform:
    os: "macOS (Apple Silicon M1)"
    python: "3.13.12 (Miniconda)"
    venv: ".venv (đã tạo)"

  tech_stack:
    - "face_recognition 1.3.0 + dlib 20.0.1 (via dlib-bin)"
    - "OpenCV 4.13.0"
    - "CustomTkinter 5.2.2"
    - "SQLite (built-in)"
    - "openpyxl (xuất Excel)"
    - "NumPy 2.4.4"
    - "Pillow 12.2.0"

  architecture:
    pattern: "MVP (Model-View-Presenter)"
    model: "src/core/"
    view: "src/gui/"
    presenter: "src/main.py"
    communication: "Event/Callback"
    config: "config.yaml"

  threading:
    main_thread: "GUI + camera preview (30fps)"
    worker_thread: "Nhận diện ngầm (mỗi 0.5-1s)"
    communication: "Queue (thread-safe)"

  data_storage:
    database: "SQLite — 8 bảng (data cố định: GV, SV, lớp, TKB, encoding + attendance history)"
    attendance_result: "Excel (xuất sau mỗi session) + SQLite (lịch sử attendance_sessions + records)"
    photos: "File trên ổ đĩa (data/teachers/, data/students/)"

  recognition_rules:
    faces_per_frame: 1
    photos_per_person: 1
    scan_interval: "0.5-1 giây"
    auto_capture: true
    tolerance: "0.5 - 0.6 (config được)"

  session_rules:
    tkb_check: "Cho phép quét trước 30 phút"
    teacher_confirm: "Bấm nút xác nhận sau khi nhận diện GV"
    switch_class: "Không cho phép"
    duration: "1 tiếng"
    end_condition: "Hết giờ tự động HOẶC GV bấm Kết thúc"
    after_session: "Xuất Excel → giải phóng RAM → quay về chờ GV"

# ============================================================
# LUỒNG HOẠT ĐỘNG CHÍNH THỨC
# ============================================================
flow:
  step_1_teacher_scan:
    name: "GV quét mặt"
    actions:
      - "Camera nhận diện GV"
      - "Tra TKB: có tiết trong 30 phút tới?"
      - "CÓ → hiển thị lớp/môn → GV bấm Xác nhận"
      - "KHÔNG CÓ / QUÁ SỚM → báo lỗi"

  step_2_student_attendance:
    name: "SV điểm danh (1 tiếng)"
    actions:
      - "Load encoding SV lớp đó vào RAM"
      - "SV soi mặt (1 người/lúc)"
      - "Nhận diện ngầm + chụp 1 ảnh tự động"
      - "Hiển thị 🟢 Có mặt"
      - "Đếm ngược 60 phút"

  step_3_end_session:
    name: "Kết thúc"
    actions:
      - "SV chưa quét → VẮNG"
      - "Tự động xuất Excel"
      - "Giải phóng RAM"
      - "Quay về step 1"

# ============================================================
# DATABASE SCHEMA (6 bảng)
# ============================================================
database:
  tables:
    - name: "teachers"
      columns: "id, name, teacher_code, photo_path, added_date"
    - name: "classes"
      columns: "id, class_code, subject, teacher_id (FK)"
    - name: "students"
      columns: "id, name, student_code, photo_path, added_date"
    - name: "class_students"
      columns: "class_id (FK), student_id (FK)"
    - name: "face_encodings"
      columns: "id, person_type, person_id, encoding (BLOB)"
    - name: "timetable"
      columns: "id, class_id (FK), day_of_week, start_time, end_time"

# ============================================================
# CẤU TRÚC PROJECT
# ============================================================
project_structure:
  - "config.yaml"
  - "requirements.txt"
  - "README.md"
  - "sprint-status.yaml"
  - "src/main.py                    # PRESENTER"
  - "src/core/__init__.py"
  - "src/core/config.py             # Đọc config"
  - "src/core/database.py           # SQLite CRUD"
  - "src/core/student_manager.py    # CRUD sinh viên"
  - "src/core/class_manager.py      # CRUD lớp + GV"
  - "src/core/recognition.py        # Detect + encode + compare"
  - "src/core/camera.py             # Webcam"
  - "src/core/worker.py             # Thread nhận diện ngầm"
  - "src/core/attendance_session.py # Logic session điểm danh"
  - "src/core/excel_export.py       # Xuất Excel"
  - "src/core/events.py             # Event/callback system"
  - "src/core/report_generator.py   # Tạo báo cáo Word"
  - "src/gui/__init__.py"
  - "src/gui/app.py                 # Cửa sổ chính"
  - "src/gui/camera_panel.py        # Camera preview"
  - "src/gui/session_panel.py       # Chọn/xác nhận + đếm ngược"
  - "src/gui/attendance_panel.py    # DS điểm danh"
  - "src/gui/student_panel.py       # DS sinh viên + xuất Excel"
  - "data/teachers/"
  - "data/students/"
  - "data/exports/"
  - "data/attendance.db"
  - "docs/bao_cao.docx"
  - "docs/lich-su-thao-luan.md"

